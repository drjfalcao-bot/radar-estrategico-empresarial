name: Diagnose Caderno documents

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-caderno-documents.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode document extension
        run: |
          set -euo pipefail
          cat v3/ext-doc2-*.b64 | tr -d '\r\n' | base64 -d | gzip -dc > /tmp/v3-ext-documents.js

      - name: Extract relevant snippets
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          source = Path('/tmp/v3-ext-documents.js').read_text(encoding='utf-8')
          patterns = [
              r'Relatório Estratégico Empresarial',
              r'PROPOSTA DE ATUAÇÃO ESTRATÉGICA',
              r'Composição financeira',
              r'Imprimir proposta',
              r'Imprimir relatório',
              r'Caderno',
              r'window\.print',
              r'data-[a-z-]*print',
              r'proposal',
              r'report',
          ]

          seen = set()
          snippets = []
          for pattern in patterns:
              for match in re.finditer(pattern, source, flags=re.I):
                  start = max(0, match.start() - 900)
                  end = min(len(source), match.end() + 1500)
                  snippet = source[start:end]
                  key = snippet[:220]
                  if key in seen:
                      continue
                  seen.add(key)
                  snippets.append(f'\n===== PATTERN: {pattern} @ {match.start()} =====\n{snippet}\n')
                  if len(snippets) >= 60:
                      break
              if len(snippets) >= 60:
                  break

          out = Path('validation/caderno-document-diagnostic.txt')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(''.join(snippets), encoding='utf-8')
          print(f'wrote {out} with {len(snippets)} snippets')
          PY

      - name: Commit diagnostic
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add validation/caderno-document-diagnostic.txt
          git diff --cached --quiet && exit 0
          git commit -m 'chore: record Caderno document diagnostic [skip ci]'
          git push
