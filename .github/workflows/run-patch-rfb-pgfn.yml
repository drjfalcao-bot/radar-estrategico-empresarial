name: Run RFB and PGFN Patch

on:
  push:
    branches: [main]
    paths:
      - 'validation/run-patch-rfb-pgfn.txt'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch and rebuild application
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p validation
          cat v3/app2-*.b64 | tr -d '\r\n' | base64 -d | gzip -dc > /tmp/radar-v3-app.js

          python3 - <<'PY'
          from pathlib import Path
          import re, json, hashlib, gzip, base64

          src_path=Path('/tmp/radar-v3-app.js')
          source=src_path.read_text(encoding='utf-8')
          counts={}
          errors=[]

          def sub(label, pattern, replacement, flags=re.S):
              global source
              source, count=re.subn(pattern,replacement,source,count=1,flags=flags)
              counts[label]=count
              if count!=1: errors.append(f'{label}: {count}')

          rfb_replacement="""    const rfbReparcelment=l.reparcelment||'nenhum';
    const rfbEntryRate=rfbReparcelment==='primeiro'?0.10:rfbReparcelment==='segundo_ou_mais'?0.20:0;
    const rfbEntry=debtRFB*rfbEntryRate;
    const rfbBalance=Math.max(0,debtRFB-rfbEntry);
    const rfbMin=String(l.rfbMinInstallmentOverride??'').trim()!==''?Math.max(0,num(l.rfbMinInstallmentOverride)):(s.rfbMinPJ||500);
    const rfbAdj=minAdjusted(rfbBalance,rfbEntryRate>0?59:60,rfbMin);
    const rfbScenario={
      id:'rfb',name:rfbReparcelment==='primeiro'?'Receita — primeiro reparcelamento (entrada de 10%)':rfbReparcelment==='segundo_ou_mais'?'Receita — segundo reparcelamento ou posterior (entrada de 20%)':'Receita — parcelamento ordinário',eligible:debtRFB>0,
      original:debtRFB,entry:rfbEntry,entryMonths:rfbEntry>0?1:0,entryInstallment:rfbEntry,entryRate:rfbEntryRate*100,reduction:0,total:rfbEntry+rfbBalance,months:rfbAdj.months,totalMonths:(rfbEntry>0?1:0)+rfbAdj.months,installment:rfbAdj.installment,
      note:rfbEntryRate>0?`Entrada mínima de ${Math.round(rfbEntryRate*100)}% considerada na formalização. O saldo remanescente foi projetado em ${rfbAdj.months} parcelas, sujeito à parcela mínima e à atualização aplicável.`:'Projeção nominal, sem desconto, sujeita à atualização aplicável.'
    };"""
          sub('rfb_calc',r"    const rfbAdj=minAdjusted\(debtRFB,60,s\.rfbMinPJ\|\|500\);.*?    \};(?=\n\n    const maxDisc)",rfb_replacement)

          pgfn_replacement="""    const maxDisc=favored(l)?s.pgfnDiscountDFavored:s.pgfnDiscountDGeneral;
    const autoDiscount={A:s.pgfnDiscountA,B:s.pgfnDiscountB,C:s.pgfnDiscountC,D:maxDisc,nao_sei:s.pgfnDiscountC}[l.capag] ?? s.pgfnDiscountC;
    const discount=String(l.pgfnDiscountOverride??'').trim()!==''?clamp(l.pgfnDiscountOverride,0,100):autoDiscount;
    const entryRatePct=String(l.pgfnEntryRateOverride??'').trim()!==''?clamp(l.pgfnEntryRateOverride,0,100):clamp(s.pgfnEntryRate,0,100);
    const entryRate=entryRatePct/100;
    const autoEntryMonths=favored(l)?s.pgfnEntryMonthsFavored:s.pgfnEntryMonthsGeneral;
    const entryMonths=Math.max(1,Math.floor(String(l.pgfnEntryMonthsOverride??'').trim()!==''?num(l.pgfnEntryMonthsOverride):autoEntryMonths));
    const pgEntry=debtPGFN*entryRate;
    const pgEntryInstallment=entryMonths>0?pgEntry/entryMonths:pgEntry;
    const pgBase=debtPGFN-pgEntry;
    const pgReduction=pgBase*clamp(discount,0,100)/100;
    const pgBalance=pgBase-pgReduction;
    const autoPgTerm=(num(l.pgfnPrev)>0 && num(l.pgfnSimple)+num(l.pgfnOther)===0)?60:145;
    const pgTerm=Math.max(entryMonths+1,Math.floor(String(l.pgfnTermOverride??'').trim()!==''?num(l.pgfnTermOverride):autoPgTerm));
    const pgMin=String(l.pgfnMinInstallmentOverride??'').trim()!==''?Math.max(0,num(l.pgfnMinInstallmentOverride)):(s.pgfnMinInstallment||100);
    const pgAdj=minAdjusted(pgBalance,Math.max(1,pgTerm-entryMonths),pgMin);
    const pgfnScenario={
      id:'pgfn',name:l.impediment?'PGFN — cenário condicionado ao impedimento':'PGFN — transação parametrizada',eligible:debtPGFN>0,
      original:debtPGFN,entry:pgEntry,entryRate:entryRatePct,entryMonths,entryInstallment:pgEntryInstallment,reduction:pgReduction,total:pgEntry+pgBalance,months:pgAdj.months,totalMonths:entryMonths+pgAdj.months,installment:pgAdj.installment,discount,
      note:l.impediment?`Há impedimento informado. Simulação financeira: entrada em ${entryMonths}x de ${brl(pgEntryInstallment)} e, se o cenário se tornar elegível, saldo em ${pgAdj.months}x de ${brl(pgAdj.installment)}. Validar modalidade e manter plano alternativo.`:`Entrada projetada em ${entryMonths}x de ${brl(pgEntryInstallment)}; depois, saldo estimado em ${pgAdj.months}x de ${brl(pgAdj.installment)}. Premissas condicionadas à modalidade, elegibilidade, CAPAG e validação dos débitos.`
    };"""
          sub('pgfn_calc',r"    const maxDisc=favored\(l\)\?s\.pgfnDiscountDFavored:s\.pgfnDiscountDGeneral;.*?    \};(?=\n    \}\;?\n|\n\n    const combined)",pgfn_replacement)

          field_marker="${field('Necessidade de certidão','certificateNeed',l.certificateNeed,'select',{options:[['baixa','Baixa'],['media','Média'],['alta','Alta']]})}"
          field_add=field_marker+"\n        ${field('Reparcelamento na Receita','reparcelment',l.reparcelment||'nenhum','select',{options:[['nenhum','Não — parcelamento ordinário'],['primeiro','Sim — primeiro reparcelamento (entrada de 10%)'],['segundo_ou_mais','Sim — segundo reparcelamento ou posterior (entrada de 20%)']],help:'A entrada é calculada sobre o débito consolidado e destacada nos cenários.'})}"
          if 'Reparcelamento na Receita' not in source:
              if field_marker in source:
                  source=source.replace(field_marker,field_add,1); counts['rfb_field']=1
              else: counts['rfb_field']=0; errors.append('rfb_field: 0')
          else: counts['rfb_field']=1

          source,n=re.subn(r"function simulationsTab\(l,r\)\{\n    const sim=simulate\(l\), strat=strategyEngine\(l,r\); const best=sim\[sim\.best\];", "function simulationsTab(l,r){\n    const sim=simulate(l), strat=strategyEngine(l,r), ps=state.db.settings.pricing; const best=sim[sim.best];",source,count=1)
          counts['sim_header']=n
          current_old='<article class="scenario-card current"><span>Cenário atual</span><h3>${brl(sim.debt)}</h3><p>Passivo informado hoje, antes de atualização e sem considerar medidas futuras.</p><ul><li>Parcela Receita estimada: ${brl(sim.rfb.installment)}</li><li>Parcela PGFN estimada: ${brl(sim.pgfn.installment)}</li><li>Risco de cobrança: ${ratingLabel(r.collection)}</li></ul></article>'
          current_new='<article class="scenario-card current"><span>Cenário atual</span><h3>${brl(sim.debt)}</h3><p>Passivo informado hoje, antes de atualização e sem considerar medidas futuras.</p><ul><li>Receita: ${sim.rfb.entry>0?`entrada de ${brl(sim.rfb.entry)} + `:\'\'}${sim.rfb.months}x de ${brl(sim.rfb.installment)}</li><li>PGFN — entrada: ${sim.pgfn.entryMonths}x de ${brl(sim.pgfn.entryInstallment)}</li><li>PGFN — saldo: ${sim.pgfn.months}x de ${brl(sim.pgfn.installment)}</li><li>Risco de cobrança: ${ratingLabel(r.collection)}</li></ul></article>'
          if current_old in source: source=source.replace(current_old,current_new,1); counts['current_card']=1
          else: counts['current_card']=0; errors.append('current_card: 0')

          strategy_old='<article class="scenario-card strategy"><span>Com estratégia</span><h3>${brl(best?.total||0)}</h3><p>${esc(strat.summary)}</p><ul><li>Entrada estimada: ${brl(best?.entry||0)}</li><li>Redução potencial: ${brl(best?.reduction||0)}</li><li>Estrutura compatível com análise integrada</li></ul></article>'
          strategy_new='<article class="scenario-card strategy"><span>Com estratégia</span><h3>${brl(best?.total||0)}</h3><p>${esc(strat.summary)}</p><ul><li>${best?.entryMonths>1?`Fase 1 — entrada: ${best.entryMonths}x de ${brl(best.entryInstallment)}`:`Entrada estimada: ${brl(best?.entry||0)}`}</li><li>${best?.months?`Fase 2 — saldo: ${best.months}x de ${brl(best.installment)}`:\'Saldo a validar\'}</li><li>Redução potencial: ${brl(best?.reduction||0)}</li></ul></article>'
          if strategy_old in source: source=source.replace(strategy_old,strategy_new,1); counts['strategy_card']=1
          else: counts['strategy_card']=0; errors.append('strategy_card: 0')

          advanced_pattern=r"      <section class=\"panel details\"><details><summary>Ajustar premissas avançadas</summary>.*?</details></section>"
          advanced_new="""      ${sim.pgfn.eligible?`<section class="panel"><div class="panel-head"><div><div class="eyebrow">Fluxo de pagamento PGFN</div><h2>Entrada e saldo em fases separadas</h2></div><span class="badge">${sim.pgfn.totalMonths} meses projetados</span></div><div class="scenario-grid"><article class="scenario-card current"><span>Fase 1 — entrada</span><h3>${sim.pgfn.entryMonths}x de ${brl(sim.pgfn.entryInstallment)}</h3><p>Total da entrada: ${brl(sim.pgfn.entry)} · ${pct(sim.pgfn.entryRate)}</p></article><article class="scenario-card strategy"><span>Fase 2 — saldo negociado</span><h3>${sim.pgfn.months}x de ${brl(sim.pgfn.installment)}</h3><p>Após entrada e redução potencial de ${brl(sim.pgfn.reduction)}.</p></article></div></section>`:''}
      <section class="panel details"><details><summary>Ajustar premissas avançadas deste caso</summary><p>Os valores abaixo substituem apenas as premissas deste cliente. Deixe o campo vazio para usar o padrão global.</p><div class="form-grid"><label class="field"><span>Entrada PGFN (%)</span><input type="number" min="0" max="100" step="0.1" data-case-field="pgfnEntryRateOverride" value="${esc(l.pgfnEntryRateOverride??'')}" placeholder="Padrão: ${ps.pgfnEntryRate}%"><small>Percentual total da entrada.</small></label><label class="field"><span>Parcelas da entrada PGFN</span><input type="number" min="1" max="24" step="1" data-case-field="pgfnEntryMonthsOverride" value="${esc(l.pgfnEntryMonthsOverride??'')}" placeholder="Padrão: ${favored(l)?ps.pgfnEntryMonthsFavored:ps.pgfnEntryMonthsGeneral}"><small>Ex.: 6 ou 12 prestações.</small></label><label class="field"><span>Desconto estimado (%)</span><input type="number" min="0" max="100" step="0.1" data-case-field="pgfnDiscountOverride" value="${esc(l.pgfnDiscountOverride??'')}" placeholder="Automático pela CAPAG"><small>Premissa gerencial, sujeita à elegibilidade.</small></label><label class="field"><span>Prazo total PGFN</span><input type="number" min="2" max="240" step="1" data-case-field="pgfnTermOverride" value="${esc(l.pgfnTermOverride??'')}" placeholder="Automático: ${sim.pgfn.totalMonths}"><small>Inclui meses da entrada e do saldo.</small></label><label class="field"><span>Parcela mínima PGFN</span><input type="number" min="0" step="0.01" data-case-field="pgfnMinInstallmentOverride" value="${esc(l.pgfnMinInstallmentOverride??'')}" placeholder="Padrão: ${brl(ps.pgfnMinInstallment)}"><small>Usada para ajustar o número de parcelas.</small></label><label class="field"><span>Parcela mínima Receita</span><input type="number" min="0" step="0.01" data-case-field="rfbMinInstallmentOverride" value="${esc(l.rfbMinInstallmentOverride??'')}" placeholder="Padrão PJ: ${brl(ps.rfbMinPJ)}"><small>Aplicada ao saldo após eventual entrada.</small></label></div><div class="legal-note">As premissas ajustadas são salvas neste caso e recalculam imediatamente entrada, saldo, redução, prazo e parcelas. A simulação continua condicionada ao edital, modalidade, natureza do débito e elegibilidade efetivamente disponíveis.</div></details></section>"""
          source,n=re.subn(advanced_pattern,advanced_new,source,count=1,flags=re.S); counts['advanced_inline']=n
          scenario_pattern=r"  function scenarioRow\(s\)\{.*?\n  \}(?=\n\n  function strategyTab)"
          scenario_new="""  function scenarioRow(s){
    if(!s.eligible) return '';
    const entry=s.entry>0?(s.entryMonths>1?`<strong>${s.entryMonths}x de ${brl(s.entryInstallment)}</strong><br><small>Total: ${brl(s.entry)}</small>`:`<strong>${brl(s.entry)}</strong>`):'Sem entrada extraordinária';
    const term=s.months?(s.entryMonths>1?`<strong>Depois:</strong> ${s.months}x de ${brl(s.installment)}<br><small>Prazo total: ${s.totalMonths||s.months} meses</small>`:`${s.months}x de ${brl(s.installment)}`):'—';
    return `<tr><td><strong>${esc(s.name)}</strong></td><td>${brl(s.original)}</td><td>${entry}</td><td>${brl(s.reduction)}</td><td>${term}</td><td>${esc(s.note)}</td></tr>`;
  }"""
          source,n=re.subn(scenario_pattern,scenario_new,source,count=1,flags=re.S); counts['scenario_row']=n
          source,n=re.subn(r"const migrationAdj=minAdjusted\(migrationBalance,145-entryMonths,s\.pgfnMinInstallment\|\|100\);","const migrationAdj=minAdjusted(migrationBalance,Math.max(1,pgTerm-entryMonths),pgMin);",source,count=1); counts['migration_term']=n
          source,n=re.subn(r"original:debtRFB,entry:migrationEntry,reduction:migrationReduction,total:migrationEntry\+migrationBalance,months:migrationAdj\.months,installment:migrationAdj\.installment,","original:debtRFB,entry:migrationEntry,entryRate:entryRatePct,entryMonths,entryInstallment:entryMonths>0?migrationEntry/entryMonths:migrationEntry,reduction:migrationReduction,total:migrationEntry+migrationBalance,months:migrationAdj.months,totalMonths:entryMonths+migrationAdj.months,installment:migrationAdj.installment,",source,count=1); counts['migration_fields']=n
          required=['rfb_calc','pgfn_calc','rfb_field','sim_header','current_card','strategy_card','advanced_inline','scenario_row','migration_term','migration_fields']
          for key in required:
              if counts.get(key)!=1 and f'{key}: 0' not in errors: errors.append(f'{key}: {counts.get(key)}')

          result='PASS' if not errors else 'FAIL'
          Path('validation/rfb-pgfn-patch-debug.txt').write_text(json.dumps({'result':result,'counts':counts,'errors':errors},ensure_ascii=False,indent=2),encoding='utf-8')

          if errors:
              raise SystemExit('; '.join(errors))

          src_path.write_text(source,encoding='utf-8')
          PY

          PATCH_STATUS=$?
          if [ "$PATCH_STATUS" -ne 0 ]; then
            echo "result=FAIL" >> validation/rfb-pgfn-patch-debug.txt
            exit 1
          fi

          node --check /tmp/radar-v3-app.js
          grep -q "Reparcelamento na Receita" /tmp/radar-v3-app.js
          grep -q "Fluxo de pagamento PGFN" /tmp/radar-v3-app.js
          grep -q "Parcelas da entrada PGFN" /tmp/radar-v3-app.js

          APP_HASH=$(sha256sum /tmp/radar-v3-app.js | awk '{print $1}')
          gzip -9 -n -c /tmp/radar-v3-app.js | base64 -w0 > /tmp/radar-v3-app.b64
          rm -f v3/app4-*.b64
          split -b 7000 -d -a 2 --additional-suffix=.b64 /tmp/radar-v3-app.b64 v3/app4-

          python3 - <<PY
          from pathlib import Path
          import re
          app_hash='$APP_HASH'
          loader=Path('v3-loader.js')
          text=loader.read_text(encoding='utf-8')
          parts='\n'.join(f"    './v3/{p.name}'," for p in sorted(Path('v3').glob('app4-*.b64'))).rstrip(',')
          text=re.sub(r"const VERSION = '[^']+';", "const VERSION = '20260714-v4-rfb-pgfn';", text)
          text=re.sub(r"const APP_PARTS = \[.*?\n  \];", f"const APP_PARTS = [\n{parts}\n  ];", text, flags=re.S)
          loader.write_text(text,encoding='utf-8')

          index=Path('index.html')
          idx=index.read_text(encoding='utf-8').replace('v3-loader.js?v=20260714-v3b','v3-loader.js?v=20260714-v4-rfb-pgfn')
          index.write_text(idx,encoding='utf-8')

          for workflow in ['.github/workflows/deploy-pages.yml','.github/workflows/validate-v3.yml']:
              p=Path(workflow); t=p.read_text(encoding='utf-8')
              t=t.replace('cat v3/app2-*.b64','cat v3/app4-*.b64').replace('cp v3/app2-*.b64 public/v3/','cp v3/app4-*.b64 public/v3/')
              t=re.sub(r'EXPECTED_APP="[0-9a-f]{64}"',f'EXPECTED_APP="{app_hash}"',t)
              t=re.sub(r'echo "[0-9a-f]{64}  /tmp/radar-v3-app.js"',f'echo "{app_hash}  /tmp/radar-v3-app.js"',t)
              p.write_text(t,encoding='utf-8')
          PY

          {
            echo "result=PASS"
            echo "app_hash=$APP_HASH"
            echo "rfb_ordinary_entry=0"
            echo "rfb_first_reparcelment_entry=10"
            echo "rfb_subsequent_reparcelment_entry=20"
            echo "pgfn_entry_is_installment_based=true"
            echo "pgfn_case_overrides=true"
            echo "advanced_parameters_inline=true"
            echo "validated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > validation/rfb-pgfn-patch-result.txt

      - name: Commit diagnostics or patched package
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation/rfb-pgfn-patch-debug.txt validation/rfb-pgfn-patch-result.txt v3/app4-*.b64 v3-loader.js index.html .github/workflows/deploy-pages.yml .github/workflows/validate-v3.yml 2>/dev/null || true
          git diff --cached --quiet || git commit -m "fix: apply auditable RFB and PGFN simulation patch [skip ci]"
          git push
