name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate unified V3 package
        run: |
          set -euo pipefail
          cat v3/app2-*.b64 | tr -d '\r\n' | base64 -d | gzip -dc > /tmp/radar-v3-app.js
          tr -d '\r\n' < v3/style-gz.b64 | base64 -d | gzip -dc > /tmp/radar-v3.css
          echo "1e2d803c5619887d4f41016ffa665693c711fff5a37d80e3aa18d7964a2b4d16  /tmp/radar-v3-app.js" | sha256sum -c -
          echo "9e9169f5c46d38dd67e47762cd3bed795295a0985a2ca7be0deb0e5a2fa32187  /tmp/radar-v3.css" | sha256sum -c -
          node --check /tmp/radar-v3-app.js
          node --check v3-loader.js
          grep -q "Central de Diagnóstico e Simulação" /tmp/radar-v3-app.js
          grep -q "Relatório Estratégico Empresarial" /tmp/radar-v3-app.js
          grep -q "Closing Rate" /tmp/radar-v3-app.js
          grep -qi "Mandado de segurança" /tmp/radar-v3-app.js
          grep -q "BROKEN_NUM_PARSER" v3-loader.js
          grep -q "FIXED_NUM_PARSER" v3-loader.js
          grep -q "typeof v === 'number'" v3-loader.js
          grep -q "raw.includes(',')" v3-loader.js

      - name: Validate V3 extension package
        run: |
          set -euo pipefail
          tr -d '\r\n' < v3/ext-core.b64 | base64 -d | gzip -dc > /tmp/v3-ext-core.js
          cat v3/ext-strategy-*.b64 | tr -d '\r\n' | base64 -d | gzip -dc > /tmp/v3-ext-strategy.js
          cat v3/ext-doc2-*.b64 | tr -d '\r\n' | base64 -d | gzip -dc > /tmp/v3-ext-documents.js
          tr -d '\r\n' < v3/ext-calendar.b64 | base64 -d | gzip -dc > /tmp/v3-ext-calendar.js
          tr -d '\r\n' < v3/ext-comparison.b64 | base64 -d | gzip -dc > /tmp/v3-ext-comparison.js
          tr -d '\r\n' < v3/ext-style.b64 | base64 -d | gzip -dc > /tmp/v3-ext.css
          echo "3a51ea58391fe59211c2c5b3d25b3662875155a9060e4e11e38aac04315d9e9b  /tmp/v3-ext-core.js" | sha256sum -c -
          echo "65c466468ffdc47064dcbab424da837ed41bfb9bbe6498a89562c9e4fa913ce0  /tmp/v3-ext-strategy.js" | sha256sum -c -
          echo "4c5a23707af278b1fc42e76c8c36a8abbbbe338f09941a4b09dc37c9cac649e9  /tmp/v3-ext-documents.js" | sha256sum -c -
          echo "f0e87739025f3d7d8ccf1b8bec78b77b7c6e87639f42e83e587446ce767a7fc2  /tmp/v3-ext-calendar.js" | sha256sum -c -
          echo "9766010b5642059af14fd12964c39364629cb2203853438bed40387b6c17cd96  /tmp/v3-ext-comparison.js" | sha256sum -c -
          echo "2e358b1ccccebcdb1dffadfec1dd779fe50801f1f80091df5acd05afb9d69724  /tmp/v3-ext.css" | sha256sum -c -
          node --check /tmp/v3-ext-core.js
          node --check /tmp/v3-ext-strategy.js
          node --check /tmp/v3-ext-documents.js
          node --check /tmp/v3-ext-calendar.js
          node --check /tmp/v3-ext-comparison.js
          node --check v3-ext-loader.js
          grep -q "RadarPatchMoneyParser" v3-ext-loader.js
          grep -q "Selecionar frentes de trabalho" /tmp/v3-ext-strategy.js
          grep -q "Composição financeira" /tmp/v3-ext-documents.js
          grep -q "Agenda de prospecção" /tmp/v3-ext-calendar.js
          grep -q "Cenário atual × condição buscada" /tmp/v3-ext-comparison.js

      - name: Validate controlled access layer
        run: |
          set -euo pipefail
          node --check cloud/supabase-config.js
          node --check cloud/auth-gate.js
          node --check cloud/admin-access.js
          grep -q "Solicitar acesso" cloud/auth-gate.js
          grep -q "approval_status" cloud/auth-gate.js
          grep -q "owner_user_id" cloud/auth-gate.js
          grep -q "20260715-final12-money-parser" cloud/auth-gate.js
          grep -q "Administração de acessos" cloud/admin-access.js
          grep -q "create policy" supabase/schema.sql
          grep -q "approved users read owned leads admin reads all" supabase/schema.sql

      - name: Validate simulations, notebook and delivery flow
        run: |
          set -euo pipefail
          node --check cloud/navigation-guard.js
          node --check cloud/calculator-core.js
          node --check cloud/active-case-context.js
          node --check cloud/strategic-calculator-engine.js
          node --check cloud/strategic-calculator.js
          node --check cloud/notebook-commercial-hub.js
          node --check cloud/document-delivery.js
          node tests/calculator-core.test.cjs
          node tests/money-parser.test.cjs
          node tests/strategic-calculator-engine.test.cjs
          grep -q "2026.07.16-premium.4" index.html
          grep -q "navigation-guard.js" index.html
          grep -q "active-case-context.js" index.html
          grep -q "strategic-calculator-engine.js" index.html
          grep -q "strategic-calculator.js" index.html
          grep -q "strategic-calculator.css" index.html
          grep -q "notebook-commercial-hub.js" index.html
          grep -q "notebook-commercial-hub.css" index.html
          grep -q "document-delivery.js" index.html
          ! grep -q "scenario-lite.js" index.html
          ! grep -q "simulations-consolidation.js" index.html
          ! grep -q "scenario-live-refresh.js" index.html
          ! grep -q "report-builder-loader.js" index.html
          grep -q "MutationObserver" cloud/navigation-guard.js
          grep -q "LEGACY_LABELS" cloud/navigation-guard.js
          grep -q "node.remove()" cloud/navigation-guard.js
          grep -q "routeToNotebook" cloud/navigation-guard.js
          grep -q "Primeiro reparcelamento" cloud/strategic-calculator.js
          grep -q "Segundo ou posterior" cloud/strategic-calculator.js
          grep -q "RFB - ESTRATÉGIA" cloud/strategic-calculator.js
          grep -q "DETALHAMENTO PGFN" cloud/strategic-calculator.js
          grep -q "Transação Individual Simplificada" cloud/strategic-calculator.js
          grep -q "Retirando os débitos da Receita" cloud/strategic-calculator.js
          grep -q "Registrar fotografia no Caderno" cloud/strategic-calculator.js
          grep -q "Com a estratégia certa, o potencial de redução é de" cloud/strategic-calculator.js
          ! grep -q 'data-tab="guarantee"' cloud/strategic-calculator.js
          grep -q "diagnosticFinal" cloud/strategic-calculator.js
          grep -q "calculateRiskRatings" cloud/strategic-calculator-engine.js
          grep -q "reportRows" cloud/strategic-calculator-engine.js
          grep -q "Formalizar o escopo técnico" cloud/strategic-calculator-engine.js
          grep -q "Risco de exposição à Reforma Tributária" cloud/strategic-calculator-engine.js
          grep -q "Montar proposta comercial" cloud/notebook-commercial-hub.js
          grep -q "restrictReportBuilder" cloud/notebook-commercial-hub.js
          grep -q "queueMicrotask(reconcile)" cloud/navigation-guard.js
          grep -q "Estruturação e apresentação de garantia" cloud/notebook-commercial-hub.js
          grep -q "Forma de pagamento" cloud/notebook-commercial-hub.js
          grep -q "data-save-advanced" cloud/strategic-calculator.js
          grep -q "strict" cloud/strategic-calculator-engine.js
          grep -q "remainingMonths" cloud/strategic-calculator-engine.js
          grep -q "Gerar PDF" cloud/document-delivery.js
          grep -q "Enviar pelo WhatsApp" cloud/document-delivery.js
          grep -q "companyResponsibleName" cloud/document-delivery.js
          grep -q "client-documents" cloud/document-delivery.js
          grep -q "createSignedUrl" cloud/document-delivery.js
          grep -q "https://wa.me/" cloud/document-delivery.js
          grep -q "html2pdf.bundle.min.js" cloud/document-delivery.js
          grep -q "client documents insert own folder" supabase/migrations/20260716_create_client_documents_bucket.sql
          grep -q "application/pdf" supabase/migrations/20260716_create_client_documents_bucket.sql
          ! grep -q "calculator-workbench.js" index.html
          ! grep -q "calculator-v3-loader.js" index.html
          ! grep -q "scenario-context-fix.js" index.html
          ! grep -q "final-polish.js" index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static application
        run: |
          set -euo pipefail
          mkdir -p public/v3 public/cloud
          cp index.html public/index.html
          cp v3-loader.js public/v3-loader.js
          cp v3-ext-loader.js public/v3-ext-loader.js
          cp v3/app2-*.b64 public/v3/
          cp v3/style-gz.b64 public/v3/
          cp v3/ext-*.b64 public/v3/
          cp cloud/*.js public/cloud/
          cp cloud/*.css public/cloud/
          cp cloud/calculator-v3-*.b64 public/cloud/
          touch public/.nojekyll
          find public -maxdepth 2 -type f -print

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
