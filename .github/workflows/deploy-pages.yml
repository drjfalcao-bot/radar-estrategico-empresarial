name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate unified V3 package
        run: |
          set -euo pipefail
          cat v3/app2-*.b64 | tr -d '\r\n' | base64 -d | gzip -dc > /tmp/radar-v3-app.js
          tr -d '\r\n' < v3/style-gz.b64 | base64 -d | gzip -dc > /tmp/radar-v3.css
          echo "1e2d803c5619887d4f41016ffa665693c711fff5a37d80e3aa18d7964a2b4d16  /tmp/radar-v3-app.js" | sha256sum -c -
          echo "9e9169f5c46d38dd67e47762cd3bed795295a0985a2ca7be0deb0e5a2fa32187  /tmp/radar-v3.css" | sha256sum -c -
          node --check /tmp/radar-v3-app.js
          grep -q "Central de Diagnóstico e Simulação" /tmp/radar-v3-app.js
          grep -q "Relatório Estratégico Empresarial" /tmp/radar-v3-app.js
          grep -q "Closing Rate" /tmp/radar-v3-app.js
          grep -q "Mandado de Segurança" /tmp/radar-v3-app.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static application
        run: |
          set -euo pipefail
          mkdir -p public/v3
          cp index.html public/index.html
          cp v3-loader.js public/v3-loader.js
          cp v3/app2-*.b64 public/v3/
          cp v3/style-gz.b64 public/v3/
          touch public/.nojekyll
          find public -maxdepth 2 -type f -print

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
