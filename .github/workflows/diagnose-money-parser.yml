name: Diagnose money parser

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-money-parser.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode V3 application
        run: |
          set -euo pipefail
          cat v3/app2-*.b64 | tr -d '\r\n' | base64 -d | gzip -dc > /tmp/radar-v3-app.js

      - name: Extract money parser candidates
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          source = Path('/tmp/radar-v3-app.js').read_text(encoding='utf-8')
          patterns = [
              r'replace\s*\(\s*/\\D/g',
              r'parseFloat\s*\(',
              r'parseInt\s*\(',
              r'Number\s*\(',
              r'pgfnPrev',
              r'pgfnOther',
              r'rfbDebt',
              r'currency',
              r'money',
              r'valor',
          ]

          seen = set()
          snippets = []
          for pattern in patterns:
              for match in re.finditer(pattern, source, flags=re.I):
                  start = max(0, match.start() - 500)
                  end = min(len(source), match.end() + 700)
                  snippet = source[start:end]
                  key = snippet[:180]
                  if key in seen:
                      continue
                  seen.add(key)
                  snippets.append(f'\n===== PATTERN: {pattern} @ {match.start()} =====\n{snippet}\n')
                  if len(snippets) >= 80:
                      break
              if len(snippets) >= 80:
                  break

          out = Path('validation/money-parser-diagnostic.txt')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(''.join(snippets), encoding='utf-8')
          print(f'wrote {out} with {len(snippets)} snippets')
          PY

      - name: Commit diagnostic
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add validation/money-parser-diagnostic.txt
          git diff --cached --quiet && exit 0
          git commit -m 'chore: record money parser diagnostic [skip ci]'
          git push
